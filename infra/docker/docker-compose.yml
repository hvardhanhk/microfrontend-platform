version: '3.8'

# Multi-Zone: each service is independently buildable and deployable.
# The host-shell owns the canonical domain and rewrites zone routes to the
# respective services.  Set NEXT_PUBLIC_MFE_*_URL to the service names so the
# rewrite destinations resolve inside the Docker network.

services:
  host-shell:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: host-shell
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MFE_PRODUCTS_URL=http://mfe-products:3000
      - NEXT_PUBLIC_MFE_CART_URL=http://mfe-cart:3000
      - NEXT_PUBLIC_MFE_USER_URL=http://mfe-user:3000
    depends_on:
      - mfe-products
      - mfe-cart
      - mfe-user

  mfe-products:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: mfe-products
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      # Assets are proxied through the host on the canonical domain in prod,
      # so no assetPrefix override needed when running behind the host-shell.

  mfe-cart:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: mfe-cart
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production

  mfe-user:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: mfe-user
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_HOST_URL=http://host-shell:3000
