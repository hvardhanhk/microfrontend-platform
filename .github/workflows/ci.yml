name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Shared packages (packages/*) affect every app, so changes there still
# trigger all jobs.  Changes scoped to a single app (apps/mfe-user/**) only
# trigger that app's job.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Shared packages: any change here rebuilds everything ──────────────────
  shared:
    name: Shared Packages — Lint & Test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(toJSON(github.event.pull_request.changed_files), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=./packages/*
      - run: npm run format:check
      - run: npx turbo test --filter=./packages/*
      - run: npx turbo build --filter=./packages/*

  # ── Per-app jobs ───────────────────────────────────────────────────────────
  host-shell:
    name: host-shell
    runs-on: ubuntu-latest
    # Run when host-shell files change, shared packages change, or on main push
    if: |
      github.ref == 'refs/heads/main' ||
      contains(toJSON(github.event.pull_request.changed_files), 'apps/host-shell/') ||
      contains(toJSON(github.event.pull_request.changed_files), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/host-shell
      - run: npx turbo test --filter=@platform/host-shell
      - run: npx turbo build --filter=@platform/host-shell

  mfe-products:
    name: mfe-products
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      contains(toJSON(github.event.pull_request.changed_files), 'apps/mfe-products/') ||
      contains(toJSON(github.event.pull_request.changed_files), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/mfe-products
      - run: npx turbo test --filter=@platform/mfe-products
      - run: npx turbo build --filter=@platform/mfe-products

  mfe-cart:
    name: mfe-cart
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      contains(toJSON(github.event.pull_request.changed_files), 'apps/mfe-cart/') ||
      contains(toJSON(github.event.pull_request.changed_files), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/mfe-cart
      - run: npx turbo test --filter=@platform/mfe-cart
      - run: npx turbo build --filter=@platform/mfe-cart

  mfe-user:
    name: mfe-user
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      contains(toJSON(github.event.pull_request.changed_files), 'apps/mfe-user/') ||
      contains(toJSON(github.event.pull_request.changed_files), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/mfe-user
      - run: npx turbo test --filter=@platform/mfe-user
      - run: npx turbo build --filter=@platform/mfe-user

  # ── Storybook / Chromatic — only on PRs touching the UI package ───────────
  storybook:
    name: Storybook & Chromatic
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      contains(toJSON(github.event.pull_request.changed_files), 'packages/ui/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build-storybook --filter=@platform/ui
      - name: Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN
        run: npx chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} --exit-zero-on-changes
        working-directory: packages/ui

