name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: detect which paths actually changed ───────────────────────────
  # dorny/paths-filter diffs the commit range and sets boolean outputs.
  # Every downstream job reads these outputs to decide whether to run.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      shared:       ${{ steps.filter.outputs.shared }}
      host-shell:   ${{ steps.filter.outputs.host-shell }}
      mfe-products: ${{ steps.filter.outputs.mfe-products }}
      mfe-cart:     ${{ steps.filter.outputs.mfe-cart }}
      mfe-user:     ${{ steps.filter.outputs.mfe-user }}
      ui:           ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/**'
            host-shell:
              - 'apps/host-shell/**'
            mfe-products:
              - 'apps/mfe-products/**'
            mfe-cart:
              - 'apps/mfe-cart/**'
            mfe-user:
              - 'apps/mfe-user/**'
            ui:
              - 'packages/ui/**'

  # ── Per-app jobs — each only runs when its own files OR shared packages changed ──

  host-shell:
    name: host-shell
    needs: changes
    if: needs.changes.outputs.host-shell == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/host-shell
      - run: npx turbo test --filter=@platform/host-shell
      - run: npx turbo build --filter=@platform/host-shell

  mfe-products:
    name: mfe-products
    needs: changes
    if: needs.changes.outputs.mfe-products == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/mfe-products
      - run: npx turbo test --filter=@platform/mfe-products
      - run: npx turbo build --filter=@platform/mfe-products

  mfe-cart:
    name: mfe-cart
    needs: changes
    if: needs.changes.outputs.mfe-cart == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/mfe-cart
      - run: npx turbo test --filter=@platform/mfe-cart
      - run: npx turbo build --filter=@platform/mfe-cart

  mfe-user:
    name: mfe-user
    needs: changes
    if: needs.changes.outputs.mfe-user == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo lint --filter=@platform/mfe-user
      - run: npx turbo test --filter=@platform/mfe-user
      - run: npx turbo build --filter=@platform/mfe-user

  # ── Storybook / Chromatic — only when the UI package changed ─────────────
  storybook:
    name: Storybook & Chromatic
    needs: changes
    if: needs.changes.outputs.ui == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build-storybook --filter=@platform/ui
      - name: Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN
        run: npx chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} --exit-zero-on-changes
        working-directory: packages/ui

